<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ShowTrackr Login</title>
  <link rel="stylesheet" href="CSS/login.css">
</head>
<body>

 
   
  <div class="navbar">
    <div class="left">
    <div class="logo">ShowTrackr</div>

    <ul class="nav-links">
      <li><a href="#">Home</a></li>
      <li><a href="#">Add</a></li>
    </ul>
</div>
    <div class="auth-links">
      <a href="#" class="btn-outline">Login</a>
      <a href="#">Sign up</a>
    </div>
  </div>

  
  <div class="container">
    <div class="card">
      <h2>Log in</h2>

      <input type="email" placeholder="Email">
      <input type="password" placeholder="Password">

      <button class="btn-primary">Log in</button>

      <p class="link">Forgot your password?</p>
      <p class="link">Don't have an account? <span>Sign up</span></p>

      <div class="divider">or</div>

      <button class="btn-facebook">Sign in with Facebook</button>
      <button class="btn-google">Sign in with Google</button>
    </div>
  </div>

</body>
</html>
